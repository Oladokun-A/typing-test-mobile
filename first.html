<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>
    <link rel="stylesheet" href="results.css">
    <link rel="icon" href="D'Armour.jpg">
</head>
<body>
    <div id="container">
        <div class="header">
            <span><img src="logo-large.svg" alt="" id="logoLarge"></span>
            <div class="pb">
                <img src="icon-personal-best.svg" alt="" id="pbL">
                <p id="pb"> Personal best:<p id="pbO">92WPM</p></p>
            </div>
        </div>
        <div id="content">
            <div><img src="icon-completed.svg" alt="" id="checkmark"></div>
            <div id="star1"><img src="pattern-star-2.svg" alt=""></div>
            <h2>Baseline established</h2>
            <p id="subtitle">You've set the bar. Now the real challenge begins-time to beat it.</p>
            <div id="cont">
                <div id="outlook">
                    <div class="outlook"><p class="outT">WPM: </p><p class="outlookO" id="e5">85</p></div>
                    <div class="outlook"><p class="outT">Accuracy: </p><p class="outlookO" id="n0">90%</p></div>
                    <div class="outlook">
                        <p class="outT">Characters: </p>
                        <span id="decider">
                            <span class="outlookO" id="outlookC">120</span>
                            <span id="slash">/</span>
                            <span class="outlookO" id="outlookD">5</span>
                        </span>
                        
                    </div>
                </div>
            </div>
        </div>
        <div id="star2"><img src="pattern-star-1.svg" alt=""></div>
        <div id="goAgain">
            <button id="b_result">Beat This Score ↺</button>
        </div>
      </div>
    </div>
    <script src="tst.js"></script>
</body>
</html>
